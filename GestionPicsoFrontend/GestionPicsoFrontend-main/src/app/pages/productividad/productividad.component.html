<app-navbar></app-navbar>
<app-boton-regresar></app-boton-regresar>

<div class="mod-container">
  <div class="mod-header">
    <h1 class="mod-titulo">Productividad</h1>
    <p class="mod-subtitulo">Métricas y rendimiento del equipo</p>
  </div>

  <div class="mod-grid">

    <div class="mod-card" (click)="irAMetricas()">
      <div class="mod-card-top">
        <span class="mod-card-num">01 —</span>
        <span class="mod-card-arrow">↗</span>
      </div>
      <div class="mod-card-icon">📊</div>
      <div class="mod-card-info">
        <h3 class="mod-card-titulo">Métricas</h3>
        <p class="mod-card-desc">Ver métricas del sistema</p>
      </div>
    </div>

    <div class="mod-card" (click)="irARendimiento()">
      <div class="mod-card-top">
        <span class="mod-card-num">02 —</span>
        <span class="mod-card-arrow">↗</span>
      </div>
      <div class="mod-card-icon">📈</div>
      <div class="mod-card-info">
        <h3 class="mod-card-titulo">Rendimiento</h3>
        <p class="mod-card-desc">Carga rendimientos de trabajadores</p>
      </div>
    </div>

    <div class="mod-card" (click)="irAVerRendimiento()">
      <div class="mod-card-top">
        <span class="mod-card-num">03 —</span>
        <span class="mod-card-arrow">↗</span>
      </div>
      <div class="mod-card-icon">📉</div>
      <div class="mod-card-info">
        <h3 class="mod-card-titulo">Resumen Rendimientos</h3>
        <p class="mod-card-desc">Ver resumen de rendimientos</p>
      </div>
    </div>

    <div class="mod-card" *ngIf="rol === 'admin'" (click)="irAGrafica()">
      <div class="mod-card-top">
        <span class="mod-card-num">04 —</span>
        <span class="mod-card-arrow">↗</span>
      </div>
      <div class="mod-card-icon">🏢</div>
      <div class="mod-card-info">
        <h3 class="mod-card-titulo">Avance de Obras</h3>
        <p class="mod-card-desc">Visualiza el progreso de actividades</p>
      </div>
    </div>

  </div>
</div>
