<div class="login-page">
  <div class="login-card">

    <div class="login-logo">
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTBYjo1_UfbblCBlBfSt0Rz5y1DPXxD5pVDag&s" alt="PICSO Logo" />
    </div>

    <div class="login-header">
      <h1 class="login-titulo">Plataforma PICSO</h1>
      <p class="login-subtitulo">Inicia sesión para continuar</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">

      <div class="login-field">
        <label for="cedula">USUARIO O CORREO</label>
        <input id="cedula" formControlName="cedula" type="text" placeholder="Ingresa tu cédula" />
      </div>

      <div class="login-field">
        <label for="contrasena">CONTRASEÑA</label>
        <input id="contrasena" formControlName="contrasena" type="password" placeholder="••••••••" />
      </div>

      <button type="submit" [disabled]="loginForm.invalid" class="login-btn">
        Iniciar Sesión
      </button>

    </form>

    <p class="login-version">v{{ version }}</p>

  </div>
</div>
